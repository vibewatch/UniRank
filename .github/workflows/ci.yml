name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. successive pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, check, build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24 is required: the scraper and the node:test suite run TypeScript
      # directly via Node's native type stripping (no build/transpile step).
      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check scraper
        run: npm run typecheck:scraper

      - name: Astro check
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Run tests
        run: npm test
